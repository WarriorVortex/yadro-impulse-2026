<div class="user-form-page">
  <nz-card [nzBordered]="false" class="user-form-page__card">
    <nz-page-header nzBackIcon class="user-form-page__header">
      <ng-container nz-page-header-title>
        <div class="form-title-row">
          <nz-avatar
            [nzText]="getAvatarLetter()"
            nzSize="large"
            class="form-avatar"
          ></nz-avatar>
          <div>
            <h1 class="form-title">
              {{ isEditMode() ? "Edit User" : "Create User" }}
            </h1>
            <span class="form-subtitle">
              {{
                isEditMode()
                  ? "Update user information"
                  : "Add a new user to the system"
              }}
            </span>
          </div>
        </div>
      </ng-container>
      <ng-container nz-page-header-extra>
        <a nz-button nzType="default" [routerLink]="listRoute">
          <span nz-icon nzType="arrow-left"></span> Cancel
        </a>
      </ng-container>
    </nz-page-header>

    @if (isLoading()) {
      <nz-skeleton [nzActive]="true" [nzParagraph]="{ rows: 8 }"></nz-skeleton>
    } @else if (isError()) {
      <nz-empty
        nzNotFoundImage="simple"
        nzNotFoundContent="Failed to load user data"
      ></nz-empty>
    } @else {
      <div class="form-container animate-fade">
        <form
          [formGroup]="form"
          (ngSubmit)="onSubmit()"
          nz-form
          nzLayout="vertical"
        >
          <app-user-form-personal [formGroup]="$any(form)" />
          <app-user-form-address [formGroup]="form.controls.address" />
          <app-user-form-company [formGroup]="form.controls.company" />

          <div class="form-actions">
            <button
              nz-button
              nzType="primary"
              [nzLoading]="isSaving()"
              [disabled]="form.invalid"
              type="submit"
            >
              {{ isEditMode() ? "Update" : "Create" }}
            </button>
          </div>
        </form>
      </div>
    }
  </nz-card>
</div>
